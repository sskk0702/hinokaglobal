<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - 株式会社HINOKA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="index.html"><img src="images/IMG_9778.PNG" alt="HINOKA Logo"></a>
        </div>
        <nav class="main-nav">
            <a href="index.html">ホーム</a>
            <a href="products.html">製品・サービス</a>
            <a href="about.html">会社概要</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
    </header>

    <main class="contact-main">
        <section class="section-title">
            <h1>お問い合わせ</h1>
            <p>業務に関するご質問やご相談は、以下のフォームよりお気軽にご連絡ください。</p>
        </section>
        
        <form action="https://formspree.io/f/你的FormspreeID" method="POST" class="contact-form">
            <div class="form-group">
                <label>お名前:</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>メールアドレス:</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>メッセージ:</label>
                <textarea name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn">送信する</button>
        </form>
    </main>

    <footer>
        <p>© 2026 株式会社HINOKA All Rights Reserved.</p>
    </footer>

</body>
</html>
