<!DOCTYPE html>
<html lang="ja">
<body>
  <div id="product-container" style="max-width: 800px; margin: 50px auto; display: flex; gap: 40px;">
    </div>

  <script src="data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pId = params.get('id');
    const p = PRODUCTS.find(x => x.id == pId);

    if(p) {
      document.getElementById('product-container').innerHTML = `
        <img src="${p.image}" style="width:400px; height:400px; object-fit:cover;">
        <div>
          <h1>${p.name}</h1>
          <p style="font-size:24px; margin:20px 0;">¥${p.price.toLocaleString()}</p>
          <button onclick="addToCart()">カートに追加</button>
        </div>
      `;
    }

    function addToCart() {
       let cart = JSON.parse(localStorage.getItem('hinoka_cart') || '[]');
       cart.push(p);
       localStorage.setItem('hinoka_cart', JSON.stringify(cart));
       alert('カートに追加しました');
       window.location.href = 'cart.html';
    }
  </script>
</body>
</html>
