<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>株式会社HINOKA - Online Store</title>
  <style>
    :root { --bg: #fbfaf7; --text: #2c2520; --gold: #c5a880; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; color: var(--text); font-family: "Helvetica Neue", sans-serif; }
    
    /* 头部 */
    header { position: fixed; top: 0; width: 100%; height: 70px; background: #fff; display: flex; align-items: center; padding: 0 5%; z-index: 9999; border-bottom: 1px solid #f0f0f0; }
    .logo { font-size: 20px; font-weight: 400; letter-spacing: 0.2em; cursor: pointer; }
    nav { display: flex; gap: 40px; margin-left: 80px; }
    nav div { cursor: pointer; font-size: 12px; color: #7c7267; letter-spacing: 0.05em; transition: 0.3s; }
    nav div:hover { color: #000; }
    .cart-trigger { margin-left: auto; cursor: pointer; font-size: 12px; color: #000; border-bottom: 1px solid #000; padding-bottom: 2px; }

    /* 商品网格 */
    .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; max-width: 1200px; margin: 100px auto 100px; padding: 0 5%; }
    .p-card { cursor: pointer; text-align: center; }
    .p-card img { width: 100%; aspect-ratio: 1 / 1.2; object-fit: cover; background: #f9f9f9; }
    .p-card h3 { font-size: 13px; margin-top: 12px; font-weight: 400; }
    .p-card p { font-size: 12px; color: #999; }
    
    /* 弹窗与侧边栏样式同前，已省略以节省篇幅，请保留你原来的 .modal-overlay 和 .cart-sidebar 样式 */
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">HINOKA</div>
  <nav>
    <div onclick="render()">すべて</div>
    <div onclick="filter('ペット用品')">ペット用品</div>
    <div onclick="filter('ファッション')">ファッション</div>
    <div onclick="filter('生活雑貨')">生活雑貨</div>
  </nav>
  <div class="cart-trigger" onclick="toggleCart(true)">
    SHOPPING BAG <span id="cartCount">(0)</span>
  </div>
</header>

<div class="products-grid" id="grid"></div>

<script src="data.js"></script>
<script>
  // 1. 确保数据在页面加载后才渲染
  let cart = JSON.parse(localStorage.getItem('hinoka_cart')) || [];

  function render(data = PRODUCTS) {
    const grid = document.getElementById('grid');
    if (typeof PRODUCTS === 'undefined') {
      grid.innerHTML = "<p>データが読み込めません。</p>";
      return;
    }
    grid.innerHTML = data.map(p => `
      <div class="p-card" onclick="openModal(${p.id})">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>¥${p.price.toLocaleString()}</p>
      </div>
    `).join('');
  }

  function filter(cat) { 
    // 使用严格匹配，防止因包含关系错误导致数据全消失
    render(PRODUCTS.filter(p => p.category === cat)); 
  }

  // ... (保留你原来的 toggleModal, toggleCart, openModal, addToCart, updateCart 等函数)

  window.onload = () => {
    // 检查数据是否存在
    console.log("Loaded Products:", typeof PRODUCTS);
    render();
    updateCart();
  };
</script>
</body>
</html>
