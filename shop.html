        badge: '人気商品',
      },
      {
        id: 'pet-002',
        category: 'pet',
        name: '猫じゃらしセット（5本）',
        desc: '羽根・鈴・ボール付きの5本セット。毎日の遊び時間が充実します。',
        price: 1480,
        image: 'images/IMG_9765.PNG',
        badge: null,
      },
      {
        id: 'pet-003',
        category: 'pet',
        name: 'ペット用スリッカーブラシ',
        desc: '抜け毛をしっかりキャッチ。猫・犬どちらにも使えるソフトピン仕様。',
        price: 1980,
        image: 'images/IMG_9765.PNG',
        badge: '新入荷',
      },
      {
        id: 'fashion-001',
        category: 'fashion',
        name: 'パールチェーンネックレス',
        desc: 'シンプルなパールモチーフが上品な印象に。普段使いからお出かけまで。',
        price: 1680,
        image: 'images/IMG_9731.PNG',
        badge: '人気商品',
      },
      {
        id: 'fashion-002',
        category: 'fashion',
        name: 'リボンヘアクリップ（2個セット）',
        desc: 'どんなスタイルにも合わせやすいシンプルリボン。カラーは3色展開。',
        price: 980,
        image: 'images/IMG_9731.PNG',
        badge: null,
      },
      {
        id: 'fashion-003',
        category: 'fashion',
        name: 'ゴールドフープピアス',
        desc: '軽量で耳への負担が少ない。シンプルなゴールドカラーがどんな服にも合う。',
        price: 1280,
        image: 'images/IMG_9731.PNG',
        badge: '新入荷',
      },
      {
        id: 'goods-001',
        category: 'goods',
        name: 'シリコン仕切り収納トレー',
        desc: '引き出しの中をすっきり整理。柔軟なシリコン素材でどんな引き出しにもフィット。',
        price: 1580,
        image: 'images/IMG_9766.PNG',
        badge: null,
      },
      {
        id: 'goods-002',
        category: 'goods',
        name: 'ステンレスランチボックス 2段',
        desc: '電子レンジ対応・食洗機対応。おしゃれなシルバーデザインでオフィスでも使いやすい。',
        price: 2480,
        image: 'images/IMG_9766.PNG',
        badge: '人気商品',
      },
      {
        id: 'goods-003',
        category: 'goods',
        name: 'アロマディフューザー USB式',
        desc: 'USBで給電できるコンパクトデザイン。静音設計でオフィスや寝室でも快適に使用可能。',
        price: 3280,
        image: 'images/IMG_9766.PNG',
        badge: '新入荷',
      },
    ];

    // ── RENDER PRODUCTS ───────────────────────────
    function renderProducts(products) {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = products.map(p => `
        <div class="shop-card fade-in" data-category="${p.category}">
          <div class="shop-card-img">
            <img src="${p.image}" alt="${p.name}" loading="lazy">
            ${p.badge ? `<div class="shop-card-badge">${p.badge}</div>` : ''}
          </div>
          <div class="shop-card-body">
            <div class="shop-card-cat">${categoryLabel(p.category)}</div>
            <div class="shop-card-name">${p.name}</div>
            <div class="shop-card-desc">${p.desc}</div>
            <div class="shop-card-bottom">
              <div class="shop-card-price">¥${p.price.toLocaleString()}<span>税込</span></div>
              <button class="add-to-cart-btn" onclick="addToCart('${p.id}','${p.name}',${p.price},'${p.image}')">
                カートへ
              </button>
            </div>
          </div>
        </div>
      `).join('');

      // Re-observe fade-in
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.05 });
      document.querySelectorAll('.shop-card.fade-in').forEach(el => observer.observe(el));
    }

    function categoryLabel(cat) {
      return { pet: 'ペット用品', fashion: 'ファッション・アクセサリー', goods: '生活雑貨' }[cat] || '';
    }

    function filterProducts(cat, btn) {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const filtered = cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
      renderProducts(filtered);
    }

    // Header scroll
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 40);
    });

    // Init
    renderProducts(PRODUCTS);
  </script>
</body>
