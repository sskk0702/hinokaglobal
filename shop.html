<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オンラインショップ - 株式会社HINOKA</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── 🛒 SHOP & MODAL EXTENSION STYLE ── */
    .shop-container { max-width: 1200px; margin: 0 auto; padding: 120px 20px 80px; }
    .shop-filters { display: flex; gap: 15px; margin-bottom: 40px; border-bottom: 1px solid var(--border, #e5e9ec); padding-bottom: 15px; overflow-x: auto; }
    .filter-btn { background: none; border: none; padding: 8px 16px; font-size: 14px; color: #606a74; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
    .filter-btn.active, .filter-btn:hover { color: #c5a880; font-weight: 600; }
    
    /* 商品网格与卡片 */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
    .p-card { background: #fff; border: 1px solid #e5e9ec; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
    .p-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .p-card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f8fafb; position: relative; }
    .p-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .p-card-badge { position: absolute; top: 12px; left: 12px; background: #1a2530; color: #fff; padding: 4px 8px; font-size: 11px; letter-spacing: 0.05em; }
    .p-card-body { padding: 20px; }
    .p-card-cat { font-size: 11px; color: #808a94; text-transform: uppercase; margin-bottom: 6px; }
    .p-card-name { font-size: 16px; font-weight: 500; color: #1a2530; margin-bottom: 8px; }
    .p-card-desc { font-size: 13px; color: #606a74; line-height: 1.6; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .p-card-bottom { display: flex; justify-content: space-between; align-items: center; }
    .p-card-price { font-size: 16px; font-weight: 700; color: #1a2530; }
    .p-card-price small { font-size: 11px; font-weight: normal; margin-left: 2px; }
    .atc-btn { background: #c5a880; color: #fff; border: none; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .atc-btn:hover { background: #1a2530; }

    /* ── 🌟 全新加入：商品全能详情弹窗 ── */
    .p-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
    .p-modal-overlay.show { display: flex; }
    .p-modal-window { background: #fff; width: 100%; max-width: 960px; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; position: relative; border-radius: 4px; animation: modalUp 0.4s ease; }
    @media (max-width: 768px) { .p-modal-window { grid-template-columns: 1fr; } }
    .close-modal-btn { position: absolute; top: 15px; right: 20px; font-size: 32px; background: none; border: none; color: #1a2530; cursor: pointer; z-index: 10; }
    
    /* 弹窗左侧媒体区 */
    .modal-gallery { padding: 30px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #e5e9ec; }
    @media (max-width: 768px) { .modal-gallery { border-right: none; border-bottom: 1px solid #e5e9ec; } }
    .modal-main-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f8fafb; border: 1px solid #e5e9ec; }
    .modal-thumb-list { display: flex; gap: 10px; overflow-x: auto; }
    .modal-thumb { width: 60px; height: 60px; object-fit: cover; border: 1px solid #e5e9ec; cursor: pointer; }
    .modal-thumb.active { border-color: #c5a880; }

    /* 弹窗右侧购买决策区 */
    .modal-info { padding: 30px; display: flex; flex-direction: column; }
    .modal-title { font-size: 22px; font-weight: 500; color: #1a2530; margin: 0 0 10px; }
    .modal-price { font-size: 20px; font-weight: 700; color: #1a2530; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e5e9ec; }
    
    /* 规格按钮组 */
    .spec-group { margin-bottom: 15px; }
    .spec-label { display: block; font-size: 12px; font-weight: 600; color: #1a2530; margin-bottom: 6px; }
    .spec-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .modal-spec-btn { border: 1px solid #e5e9ec; background: #fff; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .modal-spec-btn.active { border-color: #1a2530; background: #1a2530; color: #fff; }
    
    .modal-long-desc { font-size: 13px; color: #606a74; line-height: 1.8; margin: 20px 0; background: #f8fafb; padding: 15px; border-left: 2px solid #c5a880; }
    .modal-atc-btn { background: #c5a880; color: #fff; border: none; padding: 14px; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; margin-top: auto; }
    .modal-atc-btn:hover { background: #1a2530; }

    /* 侧边购物车原有样式延续 */
    .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 11000; }
    .cart-overlay.show { display: block; }
    .cart-drawer { position: fixed; top: 0; right: -400px; width: 100%; max-width: 400px; height: 100%; background: #fff; z-index: 12000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    .cart-drawer.open { right: 0; }
    .cart-header { padding: 24px; border-bottom: 1px solid #e5e9ec; display: flex; justify-content: space-between; align-items: center; }
    .cart-header h3 { margin: 0; font-size: 16px; font-weight: 600; color: #1a2530; }
    .close-cart-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #1a2530; }
    #cartItemsList { flex: 1; overflow-y: auto; padding: 24px; }
    .cart-item { display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f5f7f8; align-items: center; }
    .cart-item-img { width: 65px; height: 65px; object-fit: cover; background: #f8fafb; }
    .cart-item-detail { flex: 1; }
    .cart-item-name { font-size: 13px; font-weight: 600; color: #1a2530; margin-bottom: 4px; }
    .cart-item-price { font-size: 12px; color: #606a74; margin-bottom: 8px; }
    .cart-item-qty { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 24px; height: 24px; background: #fff; border: 1px solid #e5e9ec; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-val { font-size: 13px; min-width: 20px; text-align: center; }
    .cart-footer { padding: 24px; border-top: 1px solid #e5e9ec; background: #f8fafb; }
    .checkout-btn { display: block; width: 100%; background: #c5a880; color: #fff; text-align: center; padding: 14px; font-size: 13px; font-weight: 700; text-decoration: none; transition: background 0.2s; box-sizing: border-box; }
    .checkout-btn:hover { background: #1a2530; }
    .empty-cart-msg { text-align: center; color: #808a94; font-size: 13px; padding-top: 4px; }
    
    @keyframes modalUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <header id="header">
    <a href="index.html" class="logo-text">HINOKA<span>株式会社 · HINOKA Co., Ltd.</span></a>
    <nav class="main-nav">
      <a href="index.html">ホーム</a>
      <a href="shop.html" class="active">ショップ</a>
      <a href="about.html">会社概要</a>
      <a href="contact.html" class="nav-contact">お問い合わせ</a>
    </nav>
  </header>

  <div class="shop-container">
    <div class="shop-filters">
      <button class="filter-btn active" onclick="filter('all', this)">すべての商品</button>
      <button class="filter-btn" onclick="filter('pet', this)">ペット用品</button>
      <button class="filter-btn" onclick="filter('fashion', this)">ファッション・アクセ</button>
      <button class="filter-btn" onclick="filter('goods', this)">生活雑貨</button>
    </div>

    <div class="product-grid" id="grid"></div>
  </div>

  <div class="p-modal-overlay" id="productModal" onclick="closeProductModal(event)">
    <div class="p-modal-window">
      <button class="close-modal-btn" onclick="doCloseModal()">×</button>
      
      <div class="modal-gallery">
        <img src="" id="modalMainImage" class="modal-main-img" alt="メイン画像">
        <div class="modal-thumb-list" id="modalThumbList"></div>
      </div>
      
      <div class="modal-info">
        <div id="modalCategory" style="font-size:11px; color:#808a94; text-transform:uppercase; margin-bottom:4px;"></div>
        <h2 class="modal-title" id="modalTitle">商品名</h2>
        <div class="modal-price" id="modalPrice">¥0</div>
        
        <div class="spec-group" id="modalColorGroup">
          <span class="spec-label">カラー (颜色)</span>
          <div class="spec-options" id="modalColorOptions"></div>
        </div>

        <div class="spec-group" id="modalSizeGroup" style="margin-top:10px;">
          <span class="spec-label">サイズ (尺寸)</span>
          <div class="spec-options" id="modalSizeOptions"></div>
        </div>

        <div class="modal-long-desc" id="modalLongDesc"></div>
        
        <button class="modal-atc-btn" id="modalAtcBtn" onclick="addModalProductToCart()">カートに追加する (加入购物车)</button>
      </div>
    </div>
  </div>

  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>ショッピングカート</h3>
      <button class="close-cart-btn" onclick="closeCart()">×</button>
    </div>
    <div id="cartItemsList"></div>
    <div class="cart-footer" id="cartFooter">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:700;">
        <span>合計金額:</span>
        <span id="cartTotalAmount">¥0</span>
      </div>
      <a href="checkout.html" class="checkout-btn">レジに進む (前往结算)</a>
    </div>
  </div>

<script>
// ── 💡 终极商业数据库（以后有新产品或者想改颜色、改长介绍，直接在这里加改即可！） ──
const PRODUCTS = [
  {
    id: 'pet-001', category: 'pet', badge: '人気商品',
    name: '猫用ふわふわベッド',
    desc: '洗濯機で洗えるふかふか素材。猫ちゃんが大好きなドーム型デザイン。',
    price: 2980,
    image: 'images/IMG_5113ペット.PNG', // 这里是列表页显示的“主图”
    
    // ── 👇 在这里自由更换您上传的新照片路径 ──
    images: [
      'images/IMG_5113ペット.PNG', // 第一张（大图默认显示）
      'images/IMG_5114ペット.PNG', // 第二张细节
      'images/IMG_5115ペット.PNG'  // 第三张细节
    ], 
    
    colors: ['ライトグレー', 'アプリコット', 'ミルクティー'],
    sizes: ['Mサイズ (径50cm)', 'Lサイズ (径60cm)'],
    longDesc: '毎日の睡眠は大切な家族の健康に直结します。毛足の長い上質なフェイクファー素材を採用。...'
  },
  {
    id: 'fashion-001', category: 'fashion', badge: '人気商品',
    name: 'パールチェーンネックレス',
    desc: 'シンプルなパールモチーフが上品な印象に。普段使いからお出かけまで。',
    price: 1680,
    image: 'images/Photoroom_アパレル_162100.jpg',
    images: ['images/Photoroom_アパレル_162100.jpg'],
    colors: ['ゴールド', 'シルバー'],
    sizes: ['フリーサイズ'],
    longDesc: 'トレンド感のある上品な淡水パール風ネックレス。どんなコーディネートにも合わせやすく、リーズナブルな価格でお手軽に大人の輝きをプラスします。'
  },
  {
    id: 'goods-001', category: 'goods', badge: '新入荷',
    name: 'シリコン仕切り収納トレー',
    desc: '引き出しの中をすっきり整理。柔軟なシリコン素材でどんな引き出しにもフィット。',
    price: 1580,
    image: 'images/Photoroom_雑貨_162139.jpg',
    images: ['images/Photoroom_雑貨_162139.jpg'],
    colors: ['ホワイト', 'グレー'],
    sizes: ['Sサイズ', 'Mサイズ'],
    longDesc: '引き出しの中をすっきり美しく整理整頓。柔軟性のあるシリコン素材のため傷がつきにくく、丸洗いも簡単。毎日の暮らしをちょっと便利にする万能アイテムです。'
  }
];

const CAT_LABEL = { pet: 'ペット用品', fashion: 'ファッション・アクセサリー', goods: '生活雑貨' };
let cart = JSON.parse(localStorage.getItem('hinoka_cart')) || [];
let currentModalProductId = '';
let selectedColor = '';
let selectedSize = '';

// 开关购物车
function openCart() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('show');
  renderCart();
}
function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('show');
}

// ── 🌟 动态弹窗核心机制 ──
function openProductModal(id) {
  const p = PRODUCTS.find(item => item.id === id);
  if (!p) return;
  
  currentModalProductId = id;
  document.getElementById('modalCategory').innerText = CAT_LABEL[p.category];
  document.getElementById('modalTitle').innerText = p.name;
  document.getElementById('modalPrice').innerText = `¥${p.price.toLocaleString()} (税込)`;
  document.getElementById('modalLongDesc').innerText = p.longDesc || p.desc;
  
  // 初始化大图
  document.getElementById('modalMainImage').src = p.image;
  
  // 渲染多张缩略图
  const thumbContainer = document.getElementById('modalThumbList');
  const imgList = p.images && p.images.length ? p.images : [p.image];
  thumbContainer.innerHTML = imgList.map((img, idx) => `
    <img src="${img}" class="modal-thumb ${idx === 0 ? 'active' : ''}" onclick="switchModalImage('${img}', this)">
  `).join('');
  
  // 渲染颜色规格
  const colorOptions = document.getElementById('modalColorOptions');
  if (p.colors && p.colors.length) {
    document.getElementById('modalColorGroup').style.display = 'block';
    selectedColor = p.colors[0];
    colorOptions.innerHTML = p.colors.map((c, idx) => `
      <button class="modal-spec-btn ${idx === 0 ? 'active' : ''}" onclick="selectModalSpec('color', '${c}', this)">${c}</button>
    `).join('');
  } else {
    selectedColor = '';
    document.getElementById('modalColorGroup').style.display = 'none';
  }
  
  // 渲染尺寸规格
  const sizeOptions = document.getElementById('modalSizeOptions');
  if (p.sizes && p.sizes.length) {
    document.getElementById('modalSizeGroup').style.display = 'block';
    selectedSize = p.sizes[0];
    sizeOptions.innerHTML = p.sizes.map((s, idx) => `
      <button class="modal-spec-btn ${idx === 0 ? 'active' : ''}" onclick="selectModalSpec('size', '${s}', this)">${s}</button>
    `).join('');
  } else {
    selectedSize = '';
    document.getElementById('modalSizeGroup').style.display = 'none';
  }
  
  document.getElementById('productModal').classList.add('show');
}

function doCloseModal() {
  document.getElementById('productModal').classList.remove('show');
}
function closeProductModal(e) {
  if (e.target.classList.contains('p-modal-overlay')) doCloseModal();
}
function switchModalImage(src, el) {
  document.getElementById('modalMainImage').src = src;
  document.querySelectorAll('.modal-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
function selectModalSpec(type, val, el) {
  if (type === 'color') {
    selectedColor = val;
    document.getElementById('modalColorOptions').querySelectorAll('.modal-spec-btn').forEach(b => b.classList.remove('active'));
  } else {
    selectedSize = val;
    document.getElementById('modalSizeOptions').querySelectorAll('.modal-spec-btn').forEach(b => b.classList.remove('active'));
  }
  el.classList.add('active');
}

// 从弹窗加入购物车（自动带上规格后缀）
function addModalProductToCart() {
  const p = PRODUCTS.find(item => item.id === currentModalProductId);
  if (!p) return;
  
  let specName = p.name;
  let specId = p.id;
  
  if (selectedColor || selectedSize) {
    const specs = [];
    if (selectedColor) specs.push(selectedColor);
    if (selectedSize) specs.push(selectedSize);
    specName += ` (${specs.join(' / ')})`;
    specId += `-${selectedColor}-${selectedSize}`;
  }
  
  const existingItem = cart.find(item => item.id === specId);
  if (existingItem) {
    existingItem.qty += 1;
  } else {
    cart.push({ id: specId, name: specName, price: p.price, image: p.image, qty: 1 });
  }
  
  localStorage.setItem('hinoka_cart', JSON.stringify(cart));
  doCloseModal();
  openCart();
}

// 基础加购（卡片上的小按钮，默认选第一规格）
function addToCart(id, name, price, image) {
  const p = PRODUCTS.find(item => item.id === id);
  const defColor = p && p.colors ? p.colors[0] : '';
  const defSize = p && p.sizes ? p.sizes[0] : '';
  let finalId = id;
  let finalName = name;
  
  if (defColor || defSize) {
    const specs = [];
    if (defColor) specs.push(defColor);
    if (defSize) specs.push(defSize);
    finalName += ` (${specs.join(' / ')})`;
    finalId += `-${defColor}-${defSize}`;
  }

  const existingItem = cart.find(item => item.id === finalId);
  if (existingItem) {
    existingItem.qty += 1;
  } else {
    cart.push({ id: finalId, name: finalName, price, image, qty: 1 });
  }
  localStorage.setItem('hinoka_cart', JSON.stringify(cart));
  openCart();
}

function updateQty(id, change) {
  const item = cart.find(item => item.id === id);
  if (item) {
    item.qty += change;
    if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
    localStorage.setItem('hinoka_cart', JSON.stringify(cart));
    renderCart();
  }
}

function renderCart() {
  const listContainer = document.getElementById('cartItemsList');
  const footerContainer = document.getElementById('cartFooter');
  if (cart.length === 0) {
    listContainer.innerHTML = '<div class="empty-cart-msg">カートは空です。</div>';
    document.getElementById('cartTotalAmount').innerText = '¥0';
    footerContainer.style.opacity = '0.5';
    footerContainer.style.pointerEvents = 'none';
    return;
  }
  footerContainer.style.opacity = '1';
  footerContainer.style.pointerEvents = 'auto';
  let total = 0;
  listContainer.innerHTML = cart.map(item => {
    total += item.price * item.qty;
    return `
      <div class="cart-item">
        <img src="${item.image}" class="cart-item-img" alt="${item.name}">
        <div class="cart-item-detail">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">¥${item.price.toLocaleString()}</div>
          <div class="cart-item-qty">
            <button class="qty-btn" type="button" onclick="updateQty('${item.id}', -1)">-</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" type="button" onclick="updateQty('${item.id}', 1)">+</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('cartTotalAmount').innerText = '¥' + total.toLocaleString();
}

function renderGrid(list) {
  const grid = document.getElementById('grid');
  if (!grid) return;
  grid.innerHTML = list.map(p => `
    <div class="p-card" onclick="openProductModal('${p.id}')">
      <div class="p-card-img">
        <img src="${p.image}" alt="${p.name}" loading="lazy">
        ${p.badge ? `<div class="p-card-badge">${p.badge}</div>` : ''}
      </div>
      <div class="p-card-body">
        <div class="p-card-cat">${CAT_LABEL[p.category]}</div>
        <div class="p-card-name">${p.name}</div>
        <div class="p-card-desc">${p.desc}</div>
        <div class="p-card-bottom">
          <div class="p-card-price">¥${p.price.toLocaleString()}<small>税込</small></div>
          <button class="atc-btn" type="button" onclick="event.stopPropagation(); addToCart('${p.id}','${p.name}',${p.price},'${p.image}')">
            カートへ
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function filter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat));
}

window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 40);
});

// 初始化渲染
renderGrid(PRODUCTS);
</script>
</body>
</html>
