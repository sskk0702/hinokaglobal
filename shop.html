<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社HINOKA - オンラインストア</title>
  <style>
    /* ────────────────────────────────────────────────────────
       HINOKA 高奢品牌视觉系统 (Aesthetics Base)
       ──────────────────────────────────────────────────────── */
    :root {
      --bg-color: #fbfaf7;       /* 暖米色背景 */
      --text-main: #2c2520;      /* 深原木黑 */
      --text-muted: #7c7267;     /* 亚麻灰 */
      --accent-gold: #c5a880;    /* 柔金色 */
      --border-color: #eaddcf;   /* 极细边框线 */
      --font-luxury: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-luxury);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* 顶部导航栏 */
    header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      height: 70px;
      background: rgba(253, 252, 249, 0.95);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 18px;
      letter-spacing: 3px;
      font-weight: 500;
    }
    .cart-trigger {
      cursor: pointer;
      position: relative;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .cart-count-badge {
      background: var(--text-main);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 5px;
    }

    /* 分类快捷过滤器 */
    .filter-bar {
      margin-top: 110px;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0 20px;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border-color);
      padding: 8px 24px;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-muted);
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--text-main);
      color: var(--text-main);
      background: #fff;
    }

    /* 展区大标题 */
    .section-container {
      max-width: 1200px;
      margin: 60px auto 20px auto;
      padding: 0 4%;
    }
    .section-title {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 30px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
    }

    /* 商品网格（分流承载器） */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px 20px;
    }
    @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }

    /* 高奢商品卡片 */
    .p-card {
      background: #fff;
      border: 1px solid transparent;
      transition: all 0.4s ease;
    }
    .p-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(44,37,32,0.04);
    }
    .p-card-img {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #fcfbfa;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .p-card-img img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      transition: transform 0.6s ease;
    }
    .p-card:hover .p-card-img img {
      transform: scale(1.03);
    }
    .p-card-body {
      padding: 15px;
    }
    .p-card-cat {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .p-card-name {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-main);
      height: 40px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 12px;
    }
    .p-card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px dashed #f0eae4;
    }
    .p-card-price {
      font-size: 14px;
      font-weight: 500;
    }
    .p-card-price small {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: 2px;
    }
    .atc-btn {
      background: var(--text-main);
      color: #fff;
      border: none;
      padding: 6px 12px;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .atc-btn:disabled {
      background: #d0c8bf;
      cursor: not-allowed;
    }

    /* 高奢侧边栏购物车 */
    .cart-sidebar-wrapper {
      position: fixed;
      top: 0; right: -450px; width: 420px; height: 100%;
      background: #fff;
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
      z-index: 200;
      transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
    }
    .cart-sidebar-wrapper.show { right: 0; }
    .cart-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-close-btn {
      background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);
    }
    .cart-items-container {
      flex: 1; overflow-y: auto; padding: 24px;
    }
    .drawer-item-card {
      display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 20px;
      border-bottom: 1px solid #f7f4ef;
    }
    .drawer-item-img { width: 70px; height: 70px; background: #faf8f5; display:flex; align-items:center; justify-content:center;}
    .drawer-item-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .drawer-item-details { flex: 1; }
    .drawer-item-name { font-size: 13px; margin-bottom: 4px; }
    .drawer-item-price { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
    .drawer-item-qty-actions { display: flex; align-items: center; gap: 10px; }
    .drawer-qty-btn { width: 24px; height: 24px; border: 1px solid var(--border-color); background: none; cursor: pointer; }
    
    /* 运费切换控制区 */
    .shipping-selector-zone {
      padding: 15px 24px; background: #faf8f5; border-top: 1px solid var(--border-color);
    }
    .shipping-title { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
    .shipping-options { display: flex; gap: 20px; font-size: 12px; }

    .cart-footer-zone {
      padding: 24px; border-top: 1px solid var(--border-color); background: #fff;
    }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
    .grand-total-row { font-size: 16px; font-weight: bold; color: #1a1512; margin-top: 5px; padding-top: 10px; border-top: 1px dashed var(--border-color); }
    .checkout-btn { width: 100%; background: var(--text-main); color: #fff; border: none; padding: 14px; font-size: 13px; letter-spacing: 2px; cursor: pointer; margin-top: 15px; }

    /* 商品细节弹窗 (Modal) */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(44,37,32,0.4); z-index: 300;
      display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal-window {
      background: #fff; width: 90%; max-width: 900px; height: 85vh; display: flex;
      position: relative; animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
    .modal-close-x { position: absolute; top: 20px; right: 20px; font-size: 24px; background: none; border: none; cursor: pointer; z-index: 10; }
    .modal-left { width: 50%; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 30px; justify-content: center; }
    .modal-main-img-wrap { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; position: relative; }
    .modal-main-img-wrap img { max-width: 90%; max-height: 90%; object-fit: contain; }
    .modal-nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); padding: 10px; }
    .modal-arrow-left { left: 0; } .modal-arrow-right { right: 0; }
    .modal-thumb-list { display: flex; gap: 8px; justify-content: center; margin-top: 15px; overflow-x: auto; }
    .modal-thumb { width: 50px; height: 50px; object-fit: contain; border: 1px solid var(--border-color); cursor: pointer; opacity: 0.5; padding: 2px; }
    .modal-thumb.active { opacity: 1; border-color: var(--text-main); }
    
    .modal-right { width: 50%; padding: 40px 30px; overflow-y: auto; display: flex; flex-direction: column; }
    .modal-cat { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; }
    .modal-title { font-size: 18px; font-weight: 400; margin-bottom: 15px; line-height: 1.4; }
    .modal-price { font-size: 20px; font-weight: 500; margin-bottom: 20px; color: #1a1512; }
    .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.7; }
    
    .spec-group { margin-bottom: 20px; }
    .spec-label { font-size: 12px; font-weight: bold; margin-bottom: 8px; color: var(--text-main); }
    .spec-options { display: flex; flex-wrap: wrap; gap: 10px; }
    .modal-spec-btn { background: #fff; border: 1px solid var(--border-color); padding: 6px 16px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .modal-spec-btn.active { border-color: var(--text-main); background: var(--text-main); color: #fff; }
    
    .info-meta-box { margin-top: 20px; padding-top: 20px; border-top: 1px solid #f5efe9; font-size: 12px; color: var(--text-muted); }
    .meta-line { margin-bottom: 6px; }
    .meta-line strong { color: var(--text-main); }
    .modal-notice-box { margin-top: 15px; padding: 10px; background: #faf6f0; font-size: 11px; color: #9c8f80; border-left: 2px solid var(--accent-gold); }
  </style>
</head>
<body>

  <header>
    <div class="logo">HINOKA</div>
    <div class="cart-trigger" onclick="openCart()">
      CART <span id="globalCartCount" class="cart-count-badge">0</span>
    </div>

  <div class="filter-bar">

    <button class="filter-btn" onclick="filter('goods', this)">LIFESTYLE</button>

  <div class="section-container" id="fashion-section">

  <div class="section-container" id="lifestyle-section">

  <div class="cart-sidebar-wrapper" id="hinokaCartWrapper">

    </div>
    
    <div class="cart-items-container" id="cartItemsList"></div>

    <div class="shipping-selector-zone" id="cartShippingSelectorZone" style="display:none;">
      <div class="shipping-title">お届け先地域（配送料金確認）</div>
      <div class="shipping-options">
        <label style="cursor:pointer;">
          <input type="radio" name="shipping_region" id="regionMainland" value="mainland" checked onchange="changeCartRegion('mainland')">
          日本本土 (送料無料)
        </label>
        <label style="cursor:pointer;">
          <input type="radio" name="shipping_region" id="regionIsland" value="island" onchange="changeCartRegion('island')">
          北海道・沖縄・離島 (+¥1,500)
        </label>
      </div>
      <div id="cart-island-warn" style="display:none; color:#bf0000; font-size:11px; margin-top:5px;">
        ※離島地域への配送は、中継手数料として別途1,500円を申し受けます。
      </div>
    </div>

    <div class="cart-footer-zone" id="cartFooter">
      <div class="summary-row">
        <span>商品合計</span>
        <span id="cartSubtotalAmount">¥0</span>
      </div>
      <div class="summary-row">
        <span>配送料</span>
        <span id="cartShippingTotalAmount">送料無料</span>
      </div>
      <div class="summary-row grand-total-row">
        <span>総合計 (税込)</span>
        <span id="cartGrandTotalAmount">¥0</span>
      </div>
      <button class="checkout-btn" onclick="alert('注文手続きへ進みます（デモ）')">CHECKOUT</button>
    </div>
  </div>

  <div class="modal-overlay" id="productModal" onclick="closeProductModal(event)">
    <div class="modal-window">
      <button class="modal-close-x" onclick="doCloseModal()">✕</button>
      
      <div class="modal-left">
        <div class="modal-main-img-wrap">
          <button class="modal-nav-arrow modal-arrow-left" onclick="navModalImage(-1)">‹</button>

        </div>
        <div class="modal-thumb-list" id="modalThumbList"></div>
      </div>
      
      <div class="modal-right">
        <div class="modal-cat" id="modalCategory">Category</div>
        <h2 class="modal-title" id="modalTitle">Product Title</h2>
        <div class="modal-price" id="modalPrice">¥0</div>
        <div class="modal-desc" id="modalLongDesc">Description</div>
        
        <div class="spec-group" id="modalColorGroup">

          <div class="spec-options" id="modalColorOptions"></div>
        </div>
        
        <div class="spec-group" id="modalSizeGroup">

          <div class="spec-options" id="modalSizeOptions"></div>
        </div>
        
        <div class="info-meta-box">

          <div class="meta-line"><strong>素材・成分:</strong> <span id="modalMaterial"></span></div>

        </div>
        
        <button class="checkout-btn" id="modalAtcBtn" onclick="addModalProductToCart()" style="margin-top:auto;">カートに追加する</button>
      </div>
    </div>
  </div>

        price: 3800,
        stock: 18,
        badge: "new",
        image: "images/products/lfs-09-front.jpg",
        images: ["images/products/lfs-09-front.jpg"],
        colors: [{ name: "Matt Gray", priceModifier: 0 }, { name: "Matt Beige", priceModifier: 0 }],
        sizes: [{ name: "21cm", priceModifier: 0 }],
        desc: "現代の食卓に寄り添う、マットな質感がシックな美濃焼の万能ミディアムプレート。",
        origin: "大阪府より発送",
        delivery: "ご注文後、1〜3営業日以内に発送",
        material: "陶磁器（美濃焼・マット釉仕上）",
        notice: "※電子レンジ・食洗機対応。オーブンや直火でのご使用はできません。メタルマーク（金属製ナイフ等との摩擦による黒い線）がつきやすいためご注意ください。"
      },
      {
        id: 30,
        name: "オーガニック ハーブティーボックス",
        category: "生活雑貨",
        price: 2600,
        stock: 0,
        badge: "",
        image: "images/products/lfs-10-front.jpg",
        images: ["images/products/lfs-10-front.jpg"],
        colors: [{ name: "Relax Blend", priceModifier: 0 }],
        sizes: [{ name: "20 Bags", priceModifier: 0 }],
        desc: "厳選されたオーガニックハーブのみを使用。1日の終わりに心身を解きほぐすブレンド。",
        origin: "大阪府より発送",
        delivery: "ご注文後、1〜3営業日以内に発送",
        material: "有機カモミール、有機ペパーミント、有機レモングラス（生分解性ティーバッグ使用）",
        notice: "※直射日光・高温多湿を避けて冷暗所に保存してください。開封後は賞味期限に関わらずお早めにお召し上がりください。"
      }
    ];

    // ────────────────────────────────────────────────────────
    // 核心高奢控制中心核心交互逻辑
    // ────────────────────────────────────────────────────────
    let cart = JSON.parse(localStorage.getItem('hinoka_cart')) || [];
    let currentModalProductId = '';
    let selectedColorObj = null;
    let selectedSizeObj = null;
    let currentImageIndex = 0;
    let currentProductImagesArray = [];
    let currentShippingRegion = sessionStorage.getItem('hinoka_selected_region') || 'mainland';

    function openCart() {
      const cartWrapper = document.getElementById('hinokaCartWrapper');
      if (cartWrapper) cartWrapper.classList.add('show');
      
      const regionIsland = document.getElementById('regionIsland');
      const regionMainland = document.getElementById('regionMainland');
      if (currentShippingRegion === 'island' && regionIsland) {
        regionIsland.checked = true;
      } else if (regionMainland) {
        regionMainland.checked = true;
      }
      renderCart();
    }

    function closeCart() {
      const cartWrapper = document.getElementById('hinokaCartWrapper');
      if (cartWrapper) cartWrapper.classList.remove('show');
    }

    // 分流渲染函数
    function renderGrid(items) {
      const gridPet = document.getElementById('grid-pet');
      const gridFashion = document.getElementById('grid-fashion');
      const gridLifestyle = document.getElementById('grid-lifestyle');

      if (gridPet) gridPet.innerHTML = '';
      if (gridFashion) gridFashion.innerHTML = '';
      if (gridLifestyle) gridLifestyle.innerHTML = '';

      items.forEach(p => {
        const isOut = p.stock <= 0;
        let badgeHTML = '';
        if (p.badge === 'new') {
          badgeHTML = `<div style="position: absolute; top: 12px; left: 12px; background: #f5f2eb; color: #7c6e5f; font-size: 10px; padding: 3px 8px; letter-spacing: 1px; z-index: 2;">NEW</div>`;
        } else if (p.badge === 'hot') {
          badgeHTML = `<div style="position: absolute; top: 12px; left: 12px; background: #fcf1f1; color: #b86b6b; font-size: 10px; padding: 3px 8px; letter-spacing: 1px; z-index: 2;">HOT</div>`;
        }

        const cardHTML = `
          <div class="p-card" onclick="openProductModal(${p.id})" style="${isOut ? 'opacity: 0.7;' : ''}">
            <div class="p-card-img">
              ${badgeHTML}
              ${isOut ? '<div style="position:absolute; inset:0; background:rgba(26,37,48,0.7); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; z-index:6; max-height:30px; margin:auto; width:80px;">SOLD OUT</div>' : ''}
              <img src="${p.image}" alt="${p.name}">
            </div>
            <div class="p-card-body">
              <div class="p-card-cat">${p.category}</div>
              <h3 class="p-card-name">${p.name}</h3>
              <div class="p-card-bottom">
                <div class="p-card-price">¥${Number(p.price).toLocaleString()}<small>(税込)</small></div>
                <button class="atc-btn" ${isOut ? 'disabled' : ''}>${isOut ? '完売' : '詳細を見る'}</button>
              </div>
            </div>
          </div>
        `;

        const cat = p.category;
        if (cat === 'ペット用品' && gridPet) gridPet.innerHTML += cardHTML;
        else if (cat === 'ファッション・アクセサリー' && gridFashion) gridFashion.innerHTML += cardHTML;
        else if (cat === '生活雑貨' && gridLifestyle) gridLifestyle.innerHTML += cardHTML;
      });
    }

    function scrollToCategory(elementId) {
      const target = document.getElementById(elementId);
      if (target) {
        window.scrollTo({ top: target.getBoundingClientRect().top + window.pageYOffset - 90, behavior: "smooth" });
      }
    }

    // 模态弹窗控制
    function openProductModal(id) {
      const p = PRODUCTS.find(item => item.id === id);
      if (!p) return;
      
      currentModalProductId = id;
      document.getElementById('modalCategory').innerText = p.category;
      document.getElementById('modalTitle').innerText = p.name;
      document.getElementById('modalLongDesc').innerText = p.desc || '';
      document.getElementById('modalOrigin').innerText = p.origin || "大阪府より発送";
      document.getElementById('modalDelivery').innerText = p.delivery || "ご注文後、1〜3営業日以内に発送";
      document.getElementById('modalMaterial').innerText = p.material || "商品詳細に記載";
      document.getElementById('modalNotice').innerText = p.notice || "";
      
      currentProductImagesArray = p.images && p.images.length ? p.images : [p.image];
      currentImageIndex = 0;
      
      updateModalImageDisplay();
      renderModalThumbs();

      selectedColorObj = p.colors && p.colors.length ? p.colors[0] : null;
      selectedSizeObj = p.sizes && p.sizes.length ? p.sizes[0] : null;
      
      const colorOptions = document.getElementById('modalColorOptions');
      const colorGroup = document.getElementById('modalColorGroup');
      if (p.colors && p.colors.length) {
        colorGroup.style.display = 'block';
        colorOptions.innerHTML = p.colors.map((c, idx) => `
          <button class="modal-spec-btn ${idx === 0 ? 'active' : ''}" onclick="selectModalSpec('color', '${c.name}', this)">${c.name}</button>
        `).join('');
      } else { colorGroup.style.display = 'none'; }
      
      const sizeOptions = document.getElementById('modalSizeOptions');
      const sizeGroup = document.getElementById('modalSizeGroup');
      if (p.sizes && p.sizes.length) {
        sizeGroup.style.display = 'block';
        sizeOptions.innerHTML = p.sizes.map((s, idx) => `
          <button class="modal-spec-btn ${idx === 0 ? 'active' : ''}" onclick="selectModalSpec('size', '${s.name}', this)">${s.name}</button>
        `).join('');
      } else { sizeGroup.style.display = 'none'; }

      updateModalPriceAndShipping();

      const atcBtnEl = document.getElementById('modalAtcBtn');
      if (p.stock <= 0) {
        atcBtnEl.innerText = '売り切れました'; atcBtnEl.disabled = true;
      } else {
        atcBtnEl.innerText = 'カートに追加する'; atcBtnEl.disabled = false;
      }
      
      document.getElementById('productModal').classList.add('show');
    }

    function updateModalImageDisplay() {
      document.getElementById('modalMainImage').src = currentProductImagesArray[currentImageIndex];
      document.querySelectorAll('.modal-thumb').forEach((t, idx) => {
        t.classList.toggle('active', idx === currentImageIndex);
      });
    }

    function renderModalThumbs() {
      const listEl = document.getElementById('modalThumbList');
      if (currentProductImagesArray.length <= 1) { listEl.innerHTML = ''; return; }
      listEl.innerHTML = currentProductImagesArray.map((url, idx) => `
        <img src="${url}" class="modal-thumb ${idx === currentImageIndex ? 'active' : ''}" onclick="switchModalImage(${idx})">
      `).join('');
    }

    function switchModalImage(idx) { currentImageIndex = idx; updateModalImageDisplay(); }

    function navModalImage(dir) {
      currentImageIndex += dir;
      if (currentImageIndex < 0) currentImageIndex = currentProductImagesArray.length - 1;
      if (currentImageIndex >= currentProductImagesArray.length) currentImageIndex = 0;
      updateModalImageDisplay();
    }

    function updateModalPriceAndShipping() {
      const p = PRODUCTS.find(item => item.id === currentModalProductId);
      if (!p) return;
      let price = p.price;
      if (selectedColorObj) price += selectedColorObj.priceModifier;
      if (selectedSizeObj) price += selectedSizeObj.priceModifier;
      document.getElementById('modalPrice').innerText = `¥${price.toLocaleString()} (税込)`;
    }

    function selectModalSpec(type, name, el) {
      const p = PRODUCTS.find(item => item.id === currentModalProductId);
      if (type === 'color') {
        selectedColorObj = p.colors.find(c => c.name === name);
        document.getElementById('modalColorOptions').querySelectorAll('.modal-spec-btn').forEach(b => b.classList.remove('active'));
      } else {
        selectedSizeObj = p.sizes.find(s => s.name === name);
        document.getElementById('modalSizeOptions').querySelectorAll('.modal-spec-btn').forEach(b => b.classList.remove('active'));
      }
      el.classList.add('active');
      updateModalPriceAndShipping();
    }

    function doCloseModal() { document.getElementById('productModal').classList.remove('show'); }
    function closeProductModal(e) { if (e.target.id === 'productModal') doCloseModal(); }

    function addModalProductToCart() {
      const p = PRODUCTS.find(item => item.id === currentModalProductId);
      let finalPrice = p.price;
      let specText = [];
      if (selectedColorObj) { finalPrice += selectedColorObj.priceModifier; specText.push(selectedColorObj.name); }
      if (selectedSizeObj) { finalPrice += selectedSizeObj.priceModifier; specText.push(selectedSizeObj.name); }
      
      let finalName = p.name + (specText.length ? ` (${specText.join(' / ')})` : '');
      const specId = `${p.id}-${selectedColorObj?.name || ''}-${selectedSizeObj?.name || ''}`;
      
      const exist = cart.find(i => i.id === specId);
      if (exist) { exist.qty += 1; } 
      else { cart.push({ id: specId, name: finalName, price: finalPrice, image: p.image, qty: 1 }); }

      localStorage.setItem('hinoka_cart', JSON.stringify(cart));
      doCloseModal();
      openCart();
    }

    function updateQty(id, change) {
      const item = cart.find(i => i.id === id);
      if (item) {
        item.qty += change;
        if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
        localStorage.setItem('hinoka_cart', JSON.stringify(cart));
        renderCart();
      }
    }

    function changeCartRegion(val) {
      currentShippingRegion = val;
      sessionStorage.setItem('hinoka_selected_region', val);
      renderCart();
    }

    function renderCart() {
      const list = document.getElementById('cartItemsList');
      const footer = document.getElementById('cartFooter');
      const selector = document.getElementById('cartShippingSelectorZone');
      const warn = document.getElementById('cart-island-warn');
      const badge = document.getElementById('globalCartCount');
      
      badge.innerText = cart.reduce((sum, i) => sum + i.qty, 0);
      if (cart.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:30px; color:#9c8f80; font-size:13px;">カートは空です。</div>';
        document.getElementById('cartSubtotalAmount').innerText = '¥0';
        document.getElementById('cartShippingTotalAmount').innerText = '送料無料';
        document.getElementById('cartGrandTotalAmount').innerText = '¥0';
        footer.style.opacity = '0.5'; footer.style.pointerEvents = 'none';
        selector.style.display = 'none'; return;
      }
      
      footer.style.opacity = '1'; footer.style.pointerEvents = 'auto';
      selector.style.display = 'block';
      
      let subtotal = 0;
      list.innerHTML = cart.map(item => {
        subtotal += item.price * item.qty;
        return `
          <div class="drawer-item-card">
            <div class="drawer-item-img"><img src="${item.image}"></div>
            <div class="drawer-item-details">
              <div class="drawer-item-name">${item.name}</div>
              <div class="drawer-item-price">¥${item.price.toLocaleString()}</div>
              <div class="drawer-item-qty-actions">
                <button class="drawer-qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                <span>${item.qty}</span>
                <button class="drawer-qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      let fee = currentShippingRegion === 'island' ? 1500 : 0;
      warn.style.display = fee ? 'block' : 'none';
      const shipEl = document.getElementById('cartShippingTotalAmount');
      shipEl.innerText = fee ? '¥1,500' : '送料無料';
      shipEl.style.color = fee ? '#bf0000' : '#7c7267';

      document.getElementById('cartSubtotalAmount').innerText = '¥' + subtotal.toLocaleString();
      document.getElementById('cartGrandTotalAmount').innerText = '¥' + (subtotal + fee).toLocaleString();
    }

    function filter(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      if (cat === 'all') {
        scrollToCategory('pet-section');
      } else {
        scrollToCategory(cat + '-section');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderGrid(PRODUCTS);
      renderCart();
    });
  </script>
</body>
</html>
