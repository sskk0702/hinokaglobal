<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社HINOKA - オンラインストア</title>
  <style>
    :root { --bg-color: #fbfaf7; --text-main: #2c2520; --accent-gold: #c5a880; --border-color: #eaddcf; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--bg-color); color: var(--text-main); font-family: "Helvetica Neue", sans-serif; }
    
    header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(253, 252, 249, 0.95); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 4%; z-index: 100; }
    .filter-bar { margin-top: 100px; display: flex; justify-content: center; gap: 20px; padding: 0 20px; }
    .filter-btn { background: none; border: 1px solid var(--border-color); padding: 8px 24px; cursor: pointer; color: #7c7267; font-size: 13px; }
    .filter-btn.active { border-color: var(--text-main); color: var(--text-main); background: #fff; }

    .section-container { max-width: 1200px; margin: 40px auto; padding: 0 4%; }
    .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px 20px; }
    
    .p-card { background: #fff; border: 1px solid transparent; display: flex; flex-direction: column; cursor: pointer; }
    .p-card-img { width: 100%; aspect-ratio: 1/1; overflow: hidden; }
    .p-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .p-card:hover .p-card-img img { transform: scale(1.1); }
    
    .p-card-body { padding: 15px; flex: 1; }
    .atc-btn { width: 100%; padding: 10px; background: var(--text-main); color: #fff; border: none; cursor: pointer; }

    .modal-overlay { position:fixed; inset:0; background:rgba(44,37,32,0.6); z-index:999; display:none; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal-window { background:#fff; width:90%; max-width:600px; padding:30px; position:relative; }
  </style>
</head>
<body>

<header>
  <a href="index.html" style="text-decoration:none; color:inherit;"><div class="logo">HINOKA</div></a>
  <div onclick="toggleCart(true)" style="cursor:pointer;">CART (<span id="cartCount">0</span>)</div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterProducts('all', this)">ALL</button>
  <button class="filter-btn" onclick="filterProducts('ペット用品', this)">PET</button>
  <button class="filter-btn" onclick="filterProducts('ファッション・アクセサリー', this)">FASHION</button>
  <button class="filter-btn" onclick="filterProducts('生活雑貨', this)">LIFESTYLE</button>
</div>

<div class="section-container">
  <div class="products-grid" id="products-grid"></div>
</div>

<div class="modal-overlay" id="productModal" onclick="this.classList.remove('show')">
  <div class="modal-window" onclick="event.stopPropagation()">
    <button onclick="document.getElementById('productModal').classList.remove('show')" style="float:right; border:none; background:none; cursor:pointer;">✕</button>
    <div id="modalMainImgArea"><img id="modalMainImg" src="" style="width:100%;"></div>
    <div id="thumbContainer" style="display:flex; gap:10px; margin:10px 0;"></div>
    <h2 id="modalTitle"></h2>
    <div id="modalSpecs" style="margin:15px 0;"></div>
    <button class="atc-btn" id="modalAtcBtn">カートに追加</button>
  </div>
</div>

<script src="data.js"></script>
<script>
  let cart = JSON.parse(localStorage.getItem('hinoka_cart')) || [];

  function render(category = 'all') {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '';
    const filtered = (category === 'all') ? PRODUCTS : PRODUCTS.filter(p => p.category === category);
    filtered.forEach(p => {
      grid.innerHTML += `
        <div class="p-card">
          <div class="p-card-img" onclick="openModal(${p.id})"><img src="${p.image}" alt="${p.name}"></div>
          <div class="p-card-body" onclick="openModal(${p.id})">
            <h3>${p.name}</h3>
            <p>¥${p.price.toLocaleString()}</p>
          </div>
          <button class="atc-btn" onclick="addToCart(${p.id})">ADD TO CART</button>
        </div>
      `;
    });
  }

  function openModal(id) {
    const p = PRODUCTS.find(x => x.id === id);
    document.getElementById('modalMainImg').src = p.image;
    document.getElementById('thumbContainer').innerHTML = p.images.map(img => 
      `<img src="${img}" style="width:60px; height:60px; cursor:pointer;" onclick="document.getElementById('modalMainImg').src='${img}'">`
    ).join('');
    document.getElementById('modalTitle').innerText = p.name;
    
    let specs = '';
    if(p.colors) specs += `颜色:<select id="mColor">${p.colors.map(c => `<option>${c.name}</option>`).join('')}</select>`;
    if(p.sizes) specs += `尺寸:<select id="mSize">${p.sizes.map(s => `<option>${s.name}</option>`).join('')}</select>`;
    document.getElementById('modalSpecs').innerHTML = specs;
    
    document.getElementById('modalAtcBtn').onclick = () => {
        addToCart(p.id, { color: document.getElementById('mColor')?.value, size: document.getElementById('mSize')?.value });
        document.getElementById('productModal').classList.remove('show');
    };
    document.getElementById('productModal').classList.add('show');
  }

  function addToCart(id, specs = {}) {
    const p = PRODUCTS.find(item => item.id === id);
    cart.push({ ...p, specs, qty: 1 });
    localStorage.setItem('hinoka_cart', JSON.stringify(cart));
    alert('已加入购物车');
  }

  function filterProducts(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(cat);
  }

  window.addEventListener('DOMContentLoaded', () => render('all'));
</script>
</body>
</html>
