<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>株式会社HINOKA - オンラインストア</title>
  <style>
    :root { --bg: #fbfaf7; --text: #2c2520; --gold: #c5a880; --border: #eaddcf; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: "Helvetica Neue", sans-serif; }
    /* 头部导航：使用 flex 布局，清晰定义各区域 */
  header { 
    position: fixed; top: 0; width: 100%; height: 80px; 
    background: #fbfaf7; display: flex; align-items: center; 
    padding: 0 5%; z-index: 9999; border-bottom: 1px solid #eaddcf; 
  }
  
  /* 左侧 Logo */
  .logo { 
    font-size: 22px; font-weight: 300; letter-spacing: 0.2em; 
    cursor: pointer; color: #2c2520; 
  }
  
  /* 导航栏：用 margin-left 自动撑开 */
  nav { 
    display: flex; gap: 40px; margin-left: 60px; /* Logo与导航的固定距离 */
  }
  nav div { 
    cursor: pointer; font-size: 12px; color: #7c7267; 
    transition: 0.3s; letter-spacing: 0.05em; 
  }
  nav div:hover { color: #2c2520; }
  
  /* 购物车：固定在最右侧 */
  .cart-trigger { 
    margin-left: auto; /* 关键：把购物车推到最右侧 */
    cursor: pointer; font-size: 12px; color: #2c2520; 
    border-bottom: 1px solid #2c2520; padding-bottom: 2px;
  }
  .cart-trigger:hover { opacity: 0.6; }

  /* 商品列表背景优化 */
  .products-grid { 
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; 
    max-width: 1200px; margin: 120px auto 100px; padding: 20px; 
    background: #fff; /* 给商品区一个纯白背景，产生悬浮质感 */
    border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
  }
  .p-card { cursor: pointer; padding: 10px; transition: 0.3s; }
  .p-card:hover { background: #fdfdfd; }
  .p-card img { width: 100%; aspect-ratio: 1 / 1.2; object-fit: cover; }
    
    /* 购物车侧边栏 */
    .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100%; background: #fff; z-index: 10000; transition: 0.4s ease; padding: 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .cart-sidebar.show { right: 0; }
    .cart-item { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #eee; align-items: center; }

    /* 详情页弹窗 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-window { background: #fff; width: 800px; padding: 50px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .m-thumb { width: 60px; height: 60px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">HINOKA</div>
  
  <nav>
    <div onclick="render()">すべて</div>
    <div onclick="filter('ペット用品')">ペット用品</div>
    <div onclick="filter('ファッション・アクセサリー')">ファッション</div>
    <div onclick="filter('生活雑貨')">生活雑貨</div>
  </nav>
  
  <div class="cart-trigger" onclick="document.getElementById('cartSidebar').classList.add('show')">
    カート <span id="cartCount">(0)</span>
  </div>
</header>

<div class="cart-sidebar" id="cartSidebar">
  <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h2>バッグ</h2><button onclick="document.getElementById('cartSidebar').classList.remove('show')">✕</button></div>
  <div id="cartItems" style="flex:1; overflow-y:auto;"></div>
  <div id="cartTotal" style="border-top:2px solid #000; padding:20px 0;"></div>
  <button onclick="window.location.href='checkout.html'" style="width:100%; padding:15px; background:var(--text); color:#fff; border:none; cursor:pointer;">購入手続きへ進む</button>
</div>

<div class="products-grid" id="grid"></div>

<div class="modal-overlay" id="modal" onclick="this.classList.remove('show')">
  <div class="modal-window" onclick="event.stopPropagation()">
    <div>
        <img id="mImg" style="width:100%; aspect-ratio:1 / 1.2; object-fit:cover;">
        <div id="mThumbs" style="display:flex; gap:10px; margin-top:15px;"></div>
    </div>
    <div>
      <h2 id="mTitle"></h2>
      <p id="mPrice" style="margin:15px 0; font-size:20px;"></p>
      <div id="mSpecs" style="margin-bottom:20px;"></div>
      <div id="mInfo" style="font-size:13px; line-height:2; color:#555;"></div>
      <button id="mBtn" style="width:100%; padding:18px; margin-top:20px; border:none; cursor:pointer; background:var(--text); color:#fff;"></button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  let cart = JSON.parse(localStorage.getItem('hinoka_cart')) || [];

  function render(data = PRODUCTS) {
    document.getElementById('grid').innerHTML = data.map(p => `
      <div class="p-card" onclick="openModal(${p.id})">
        <img src="${p.image}" onmouseover="this.src='${p.images[0] || p.image}'" onmouseout="this.src='${p.image}'">
        <div style="padding:15px;"><h3>${p.name}</h3><p>¥${p.price.toLocaleString()}</p></div>
      </div>
    `).join('');
  }

  function filter(cat) { render(PRODUCTS.filter(p => p.category === cat)); }

// 修复后的 openModal
  function openModal(id) {
    const p = PRODUCTS.find(x => x.id === id);
    if (!p) {
        console.error("找不到该商品ID:", id);
        return;
    }
    
    document.getElementById('mImg').src = p.image;
    // 修复点：使用 || [] 确保即使没有 images 字段也不会报错
    const imgList = [p.image, ...(p.images || [])]; 
    document.getElementById('mThumbs').innerHTML = imgList.map(i => 
        `<img src="${i}" class="m-thumb" onclick="document.getElementById('mImg').src='${i}'">`
    ).join('');
    
    document.getElementById('mTitle').innerText = p.name;
    document.getElementById('mPrice').innerText = `¥${p.price.toLocaleString()}`;
    
    document.getElementById('mSpecs').innerHTML = `
      <p>カラー: <select id="selCol">${(p.colors || []).map(c=>`<option>${c.name}</option>`).join('')}</select></p>
      <p>サイズ: <select id="selSiz">${(p.sizes || []).map(s=>`<option>${s.name}</option>`).join('')}</select></p>`;
      
    document.getElementById('mInfo').innerHTML = `<p>発送地: ${p.origin}</p><p>素材: ${p.material}</p><p style="color:red; margin-top:10px;">${p.notice || ""}</p>`;
    
    const btn = document.getElementById('mBtn');
    btn.innerText = p.stock > 0 ? "カートに入れる" : "在庫なし";
    btn.onclick = p.stock > 0 ? () => { 
        cart.push(p); 
        localStorage.setItem('hinoka_cart', JSON.stringify(cart)); 
        updateCart(); 
        document.getElementById('modal').classList.remove('show'); 
    } : null;
    
    document.getElementById('modal').classList.add('show');
  }

  // 修复后的 updateCart
  function updateCart() {
    document.getElementById('cartCount').innerText = `(${cart.length})`;
    let sub = cart.reduce((s, i) => s + i.price, 0);
    // 修复点：将全角 ０ 改为半角 0
    document.getElementById('cartTotal').innerHTML = `<h3>合計: ¥${sub.toLocaleString()} (送料込)</h3>`;
    
    document.getElementById('cartItems').innerHTML = cart.map((i, idx) => `
      <div class="cart-item">
        <div><p>${i.name}</p><p>¥${i.price.toLocaleString()}</p></div>
        <button onclick="removeItem(${idx})" style="border:none; background:none; cursor:pointer; color:red;">削除</button>
      </div>`).join('');
  }

  function removeItem(idx) { cart.splice(idx, 1); localStorage.setItem('hinoka_cart', JSON.stringify(cart)); updateCart(); }

  window.onclick = (e) => { if (e.target.id === 'modal') document.getElementById('modal').classList.remove('show'); };
  window.onload = () => { render(); updateCart(); };
</script>
</body>
</html>
