<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>株式会社HINOKA - Online Store</title>
  <style>
    :root { --bg: #f5f2ed; --text: #2c2520; }
    body { background: #fff; color: var(--text); font-family: "Helvetica Neue", sans-serif; }
    
    /* 缩小后的 Logo 抬头 */
    .header-logo { padding: 40px 0; text-align: center; font-size: 20px; letter-spacing: 0.2em; font-weight: 400; cursor: pointer; }
    
    /* 导航栏 */
    .sticky-nav { position: sticky; top: 0; background: #fff; padding: 15px 0; border-bottom: 1px solid #eaddcf; z-index: 900; text-align: center; font-size: 13px; }
    .sticky-nav span { margin: 0 25px; cursor: pointer; color: #7c7267; transition: 0.3s; }
    .sticky-nav span:hover { color: var(--text); }

    /* 商品网格 */
    .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1000px; margin: 50px auto; padding: 0 20px; }
    .card { cursor: pointer; text-align: center; }
    .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; transition: 0.5s; }
    .card:hover img { opacity: 0.8; }
    .card h3 { font-size: 14px; font-weight: 400; margin-top: 15px; }
    .card p { font-size: 13px; color: #9a9490; }
  </style>
</head>
<body>

<div class="header-logo" onclick="window.location.href='index.html'">HINOKA</div>

<nav class="sticky-nav">
    <span onclick="render()">すべて</span>
    <span onclick="filter('ペット用品')">ペット用品</span>
    <span onclick="filter('ファッション')">ファッション</span>
    <span onclick="filter('生活雑貨')">生活雑貨</span>
</nav>

<div class="products-grid" id="grid"></div>

<script src="data.js"></script>
<script>
  function render(data = PRODUCTS) {
    document.getElementById('grid').innerHTML = data.map(p => `
      <div class="card" onclick="openDetail(${p.id})">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>¥${p.price.toLocaleString()}</p>
      </div>
    `).join('');
  }

  function filter(cat) { render(PRODUCTS.filter(p => p.category === cat)); }

  // 关键：点击跳转详情页，带 ID 参数
  function openDetail(id) {
    window.location.href = `product_detail.html?id=${id}`;
  }
  
  window.onload = () => render();
</script>
</body>
</html>
