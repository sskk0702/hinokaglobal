<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社HINOKA - オンラインストア</title>
  <style>
    :root { --bg: #fbfaf7; --text: #2c2520; --gold: #c5a880; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; }
    
    /* 导航栏 */
    header { position: fixed; top: 0; width: 100%; background: #fff; padding: 20px 4%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid #eee; }
    nav a { margin-right: 20px; text-decoration: none; color: var(--text); font-weight: bold; }
    
    .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1200px; margin: 120px auto 40px; padding: 0 4%; }
    .p-card { background: #fff; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
    .p-card:hover { transform: translateY(-5px); }
    .p-card-img { width: 100%; aspect-ratio: 1/1; overflow: hidden; }
    .p-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .p-card-body { padding: 15px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-window { background: #fff; width: 500px; padding: 30px; position: relative; }
    
    .cart-sidebar { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: #fff; z-index: 3000; transition: 0.4s; padding: 20px; box-shadow: -5px 0 10px rgba(0,0,0,0.1); }
    .cart-sidebar.show { right: 0; }
  </style>
</head>
<body>

<header>
  <h1>HINOKA</h1>
  <nav>
    <a href="#" onclick="filterProducts('ペット用品')">PET</a>
    <a href="#" onclick="filterProducts('ファッション・アクセサリー')">FASHION</a>
    <a href="#" onclick="filterProducts('生活雑貨')">LIFESTYLE</a>
  </nav>
  <div onclick="document.getElementById('cartSidebar').classList.add('show')" style="cursor:pointer;">カート(<span id="cartCount">0</span>)</div>
</header>

<div class="products-grid" id="products-grid"></div>

<div class="cart-sidebar" id="cartSidebar">
  <h3>ショッピングカート</h3>
  <div id="cartItems" style="margin:20px 0;"></div>
  <div id="cartTotal" style="border-top:1px solid #000; padding-top:10px;"></div>
  <button onclick="window.location.href='checkout.html'" style="width:100%; padding:10px; margin-top:20px; background:var(--gold); border:none; color:#fff;">購入手続きへ</button>
</div>

<div class="modal-overlay" id="productModal" onclick="this.classList.remove('show')">
  <div class="modal-window" onclick="event.stopPropagation()">
    <img id="modalImg" style="width:100%; aspect-ratio:1/1; object-fit:cover;">
    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <div id="modalSpecs"></div>
    <button id="modalAtcBtn" style="width:100%; padding:15px; background:var(--text); color:#fff; border:none; margin-top:20px;">カートに入れる</button>
  </div>
</div>

<script src="data.js"></script>
<script>
  let cart = JSON.parse(localStorage.getItem('hinoka_cart')) || [];

  function render(data = PRODUCTS) {
    document.getElementById('products-grid').innerHTML = data.map(p => `
      <div class="p-card" onclick="openModal(${p.id})">
        <div class="p-card-img"><img src="${p.image}"></div>
        <div class="p-card-body"><h3>${p.name}</h3><p>¥${p.price.toLocaleString()}</p></div>
      </div>
    `).join('');
  }

  function filterProducts(cat) {
    render(PRODUCTS.filter(p => p.category === cat));
  }

  function openModal(id) {
    const p = PRODUCTS.find(x => x.id === id);
    document.getElementById('modalImg').src = p.image;
    document.getElementById('modalTitle').innerText = p.name;
    document.getElementById('modalPrice').innerText = `¥${p.price.toLocaleString()}`;
    document.getElementById('modalSpecs').innerHTML = `
      <p>素材: ${p.material}</p><p>送料: 基本¥800 (離島+¥1000)</p>
      <select id="sCol">${p.colors.map(c=>`<option>${c.name}</option>`).join('')}</select>
    `;
    document.getElementById('modalAtcBtn').onclick = () => addToCart(p);
    document.getElementById('productModal').classList.add('show');
  }

  function addToCart(p) {
    cart.push(p);
    localStorage.setItem('hinoka_cart', JSON.stringify(cart));
    updateCart();
    alert('カートに1点追加されました');
    document.getElementById('productModal').classList.remove('show');
  }

  function updateCart() {
    document.getElementById('cartCount').innerText = cart.length;
    let subtotal = cart.reduce((sum, p) => sum + p.price, 0);
    let shipping = 800; // 假设默认为基础运费
    let total = subtotal + shipping;
    
    document.getElementById('cartItems').innerHTML = cart.map(p => `<p>${p.name} - ¥${p.price.toLocaleString()}</p>`).join('');
    document.getElementById('cartTotal').innerHTML = `
      <p>小計: ¥${subtotal.toLocaleString()}</p>
      <p>送料: ¥${shipping.toLocaleString()}</p>
      <p><strong>合計: ¥${total.toLocaleString()}</strong></p>
    `;
  }

  window.onload = () => { render(); updateCart(); };
</script>
</body>
</html>
